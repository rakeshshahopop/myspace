<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>myspace - Dashboard</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: #f5f4f0; padding: 20px; display: flex; justify-content: center; }
.app { display: flex; width: 100%; max-width: 1000px; height: 680px; background: #fff; border-radius: 16px; overflow: hidden; border: 0.5px solid #e8e6e0; box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
.sidebar { width: 200px; background: #1c1c1a; display: flex; flex-direction: column; padding: 20px 0; flex-shrink: 0; }
.sidebar-logo { padding: 0 20px 20px; font-size: 15px; font-weight: 500; color: #fff; letter-spacing: -0.3px; }
.sidebar-logo span { color: #7F77DD; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 20px; font-size: 13px; color: #888; cursor: pointer; transition: all 0.15s; }
.nav-item:hover { color: #ccc; background: rgba(255,255,255,0.05); }
.nav-item.active { color: #fff; background: rgba(127,119,221,0.18); border-right: 2px solid #7F77DD; }
.nav-item i { font-size: 16px; }
.nav-section { font-size: 10px; color: #444; padding: 16px 20px 6px; letter-spacing: 0.5px; text-transform: uppercase; }
.main { flex: 1; overflow-y: auto; padding: 24px; background: #faf9f7; }
.top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.top-bar h1 { font-size: 18px; font-weight: 500; color: #1c1c1a; }
.top-bar .date { font-size: 12px; color: #888; }
.cards-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 16px; }
.dash-card { background: #fff; border-radius: 14px; padding: 16px; border: 0.5px solid #e8e6e0; cursor: pointer; transition: border-color 0.15s; }
.dash-card:hover { border-color: #7F77DD; }
.card-label { font-size: 11px; color: #888; margin-bottom: 6px; }
.card-val { font-size: 22px; font-weight: 500; color: #1c1c1a; }
.card-sub { font-size: 11px; color: #888; margin-top: 4px; }
.prog-bar { height: 4px; background: #f0ede8; border-radius: 2px; margin-top: 10px; }
.prog-fill { height: 100%; border-radius: 2px; transition: width 0.3s ease; }
.detail-panel { background: #fff; border-radius: 14px; border: 0.5px solid #e8e6e0; overflow: hidden; }
.panel-tabs { display: flex; border-bottom: 0.5px solid #e8e6e0; }
.tab { padding: 10px 16px; font-size: 12px; color: #888; cursor: pointer; border-bottom: 2px solid transparent; }
.tab.active { color: #7F77DD; border-bottom-color: #7F77DD; font-weight: 500; }
.panel-body { padding: 16px; }
.routine-group { margin-bottom: 14px; }
.group-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: #aaa; margin-bottom: 6px; }
.check-row { display: flex; align-items: center; gap: 10px; padding: 7px 10px; border-radius: 8px; margin-bottom: 3px; background: #faf9f7; cursor: pointer; transition: background 0.2s; }
.check-row:hover { background: #f1f0ed; }
.check-row.done { opacity: 0.55; }
.cb { width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid #d0cec8; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.cb.checked { background: #1D9E75; border-color: #1D9E75; }
.cb.checked::after { content: ''; width: 6px; height: 4px; border-left: 1.5px solid #fff; border-bottom: 1.5px solid #fff; transform: rotate(-45deg) translateY(-1px); display: block; }
.check-label { font-size: 12px; color: #2c2c2a; flex: 1; }
.check-label.line-through { text-decoration: line-through; color: #aaa; }
.check-time { font-size: 10px; color: #aaa; }
.note-input { width: 100%; font-size: 12px; border: 0.5px solid #e8e6e0; border-radius: 8px; padding: 8px 10px; color: #2c2c2a; background: #faf9f7; resize: none; outline: none; margin-top: 10px; }
.note-input:focus { border-color: #7F77DD; }
.todo-item { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 0.5px solid #f5f4f0; }
.note-card { background: #faf9f7; border-radius: 8px; padding: 10px 12px; border: 0.5px solid #e8e6e0; position: relative; }
.delete-btn { position: absolute; top: 10px; right: 10px; background: none; border: none; color: #ff6b6b; cursor: pointer; font-size: 12px; }
</style>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght=400;500&display=swap" rel="stylesheet">
</head>
<body>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-logo">my<span>space</span></div>
    <div class="nav-section">Main</div>
    <div class="nav-item active" onclick="showPanel('dashboard')"><i class="ti ti-layout-dashboard"></i> Dashboard</div>
    <div class="nav-item" onclick="showPanel('routine')"><i class="ti ti-checkbox"></i> Routine</div>
    <div class="nav-item" onclick="showPanel('notes')"><i class="ti ti-notes"></i> Notes</div>
    <div class="nav-item" onclick="showPanel('todos')"><i class="ti ti-circle-check"></i> To-do</div>
  </div>

  <div class="main">
    
    <div id="panel-dashboard" class="panel-content">
      <div class="top-bar">
        <h1>Dashboard Overview</h1>
        <span class="date text-muted">Wednesday, 27 May 2026</span>
      </div>
      <div class="cards-grid">
        <div class="dash-card" onclick="showPanel('routine')">
          <div class="card-label"><i class="ti ti-checkbox"></i> Routine Completion</div>
          <div class="card-val" id="dash-routine-count">0 / 0</div>
          <div class="prog-bar"><div id="dash-routine-progress" class="prog-fill" style="background:#7F77DD; width:0%"></div></div>
        </div>
        <div class="dash-card" onclick="showPanel('todos')">
          <div class="card-label"><i class="ti ti-circle-check"></i> Active Tasks</div>
          <div class="card-val" id="dash-todo-count">0 Pending</div>
          <div class="card-sub">Tap to manage tasks</div>
        </div>
      </div>
    </div>

    <div id="panel-routine" class="panel-content" style="display:none">
      <div class="top-bar"><h1>Daily Routine</h1></div>
      <div class="detail-panel">
        <div class="panel-body" id="routine-container">
          </div>
      </div>
    </div>

    <div id="panel-notes" class="panel-content" style="display:none">
      <div class="top-bar"><h1>My Notebook</h1></div>
      <div class="detail-panel">
        <div class="panel-body">
          <div style="display:flex; flex-direction:column; gap:10px;" id="notes-container">
            </div>
          <hr style="margin: 20px 0; border: 0.5px solid #e8e6e0;">
          <input type="text" id="note-title" placeholder="Note Title..." style="width:100%; padding:8px; border-radius:6px; border:0.5px solid #e8e6e0; outline:none;" />
          <textarea class="note-input" id="note-content" rows="3" placeholder="Start writing something awesome..."></textarea>
          <button id="save-note-btn" style="margin-top:8px; width:100%; padding:8px; background:#7F77DD; border:none; color:white; border-radius:6px; cursor:pointer; font-weight:500;">Save Note</button>
        </div>
      </div>
    </div>

    <div id="panel-todos" class="panel-content" style="display:none">
      <div class="top-bar"><h1>To-Do List</h1></div>
      <div class="detail-panel">
        <div class="panel-body">
          <div id="todo-container" style="margin-bottom: 15px;">
            </div>
          <div style="display:flex; gap:8px">
            <input id="todo-input" style="flex:1; font-size:12px; padding:7px 10px; border-radius:8px; border:0.5px solid #e8e6e0; background:#faf9f7; outline:none;" placeholder="Add a new master plan..." />
            <button id="add-todo-btn" style="padding:7px 14px; font-size:12px; border-radius:8px; border:1px solid #7F77DD; color:#534AB7; background:#EEEDFE; cursor:pointer; font-weight:500;">Add</button>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  // Replace with your personalized Firebase Configuration Object
  const firebaseConfig = {
    apiKey: "AIzaSyAqxUmi_1I6-Uc7SOpsCQDX3u0g4Ou8NfU",
    authDomain: "myspace-7144e.firebaseapp.com",
    projectId: "myspace-7144e",
    storageBucket: "myspace-7144e.firebasestorage.app",
    messagingSenderId: "547510372352",
    appId: "1:547510372352:web:37e3de1b19dc84d1f5f0e5"
  };

  // Initialize Firebase & Cloud Firestore
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // --- SYSTEM: NAVIGATION ---
  window.showPanel = function(panelId) {
    document.querySelectorAll('.panel-content').forEach(p => p.style.display = 'none');
    document.getElementById('panel-' + panelId).style.display = 'block';
    
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    const clickedItem = Array.from(document.querySelectorAll('.nav-item')).find(item => item.getAttribute('onclick').includes(panelId));
    if(clickedItem) clickedItem.classList.add('active');
  };

  // --- MODULE 1: INTERACTIVE ROUTINE TRACKER ---
  const initialRoutines = [
    { text: "Wake up at 6:00 AM", time: "6:00 AM", done: false },
    { text: "Morning exercise (30 min)", time: "6:15 AM", done: false },
    { text: "DSA practice (LeetCode)", time: "8:00 AM", done: false },
    { text: "Read 30 pages", time: "9:00 AM", done: false }
  ];

  async function checkAndSeedRoutine() {
    const querySnapshot = await getDocs(collection(db, "routine"));
    if (querySnapshot.empty) {
      for (const item of initialRoutines) {
        await addDoc(collection(db, "routine"), item);
      }
    }
  }

  function setupRoutineListener() {
    onSnapshot(collection(db, "routine"), (snapshot) => {
      const container = document.getElementById('routine-container');
      container.innerHTML = '';
      let doneCount = 0;
      let totalCount = snapshot.size;

      snapshot.forEach((docSnap) => {
        const item = docSnap.data();
        const id = docSnap.id;
        if(item.done) doneCount++;

        const row = document.createElement('div');
        row.className = `check-row ${item.done ? 'done' : ''}`;
        row.innerHTML = `
          <div class="cb ${item.done ? 'checked' : ''}"></div>
          <span class="check-label">${item.text}</span>
          <span class="check-time">${item.time}</span>
        `;
        row.onclick = async () => {
          await updateDoc(doc(db, "routine", id), { done: !item.done });
        };
        container.appendChild(row);
      });

      // Update Dashboard Metrics Real-time
      document.getElementById('dash-routine-count').innerText = `${doneCount} / ${totalCount}`;
      const pct = totalCount > 0 ? (doneCount / totalCount) * 100 : 0;
      document.getElementById('dash-routine-progress').style.width = `${pct}%`;
    });
  }

  // --- MODULE 2: INTERACTIVE TO-DO LIST ---
  function setupTodoListener() {
    onSnapshot(collection(db, "todos"), (snapshot) => {
      const container = document.getElementById('todo-container');
      container.innerHTML = '';
      let pendingCount = 0;

      snapshot.forEach((docSnap) => {
        const item = docSnap.data();
        const id = docSnap.id;
        if(!item.done) pendingCount++;

        const div = document.createElement('div');
        div.className = 'todo-item';
        div.innerHTML = `
          <div class="cb ${item.done ? 'checked' : ''}" style="cursor:pointer"></div>
          <span class="check-label ${item.done ? 'line-through' : ''}" style="cursor:pointer">${item.text}</span>
          <i class="ti ti-trash delete-todo-btn" style="color:#ff6b6b; cursor:pointer; margin-left:auto;"></i>
        `;

        // Toggle Done status
        const toggleEls = div.querySelectorAll('.cb, .check-label');
        toggleEls.forEach(el => {
          el.onclick = async () => {
            await updateDoc(doc(db, "todos", id), { done: !item.done });
          };
        });

        // Delete Handler
        div.querySelector('.delete-todo-btn').onclick = async () => {
          await deleteDoc(doc(db, "todos", id));
        };

        container.appendChild(div);
      });

      document.getElementById('dash-todo-count').innerText = `${pendingCount} Pending`;
    });
  }

  document.getElementById('add-todo-btn').onclick = async () => {
    const input = document.getElementById('todo-input');
    if(!input.value.trim()) return;
    await addDoc(collection(db, "todos"), {
      text: input.value.trim(),
      done: false,
      createdAt: new Date()
    });
    input.value = '';
  };

  // --- MODULE 3: INTERACTIVE NOTEBOOK ---
  function setupNotesListener() {
    const q = query(collection(db, "notes"), orderBy("createdAt", "desc"));
    onSnapshot(q, (snapshot) => {
      const container = document.getElementById('notes-container');
      container.innerHTML = '';

      snapshot.forEach((docSnap) => {
        const note = docSnap.data();
        const id = docSnap.id;

        const div = document.createElement('div');
        div.className = 'note-card';
        div.innerHTML = `
          <div style="font-size:12px; font-weight:500; color:#2c2c2a">${note.title}</div>
          <div style="font-size:11px; color:#666; margin-top:2px; white-space: pre-wrap;">${note.content}</div>
          <button class="delete-btn"><i class="ti ti-trash"></i></button>
        `;

        div.querySelector('.delete-btn').onclick = async () => {
          await deleteDoc(doc(db, "notes", id));
        };

        container.appendChild(div);
      });
    });
  }

  document.getElementById('save-note-btn').onclick = async () => {
    const titleEl = document.getElementById('note-title');
    const contentEl = document.getElementById('note-content');
    if(!titleEl.value.trim() || !contentEl.value.trim()) return;

    await addDoc(collection(db, "notes"), {
      title: titleEl.value.trim(),
      content: contentEl.value.trim(),
      createdAt: new Date()
    });

    titleEl.value = '';
    contentEl.value = '';
  };

  // --- INITIALIZATION LAUNCH ---
  async function init() {
    await checkAndSeedRoutine();
    setupRoutineListener();
    setupTodoListener();
    setupNotesListener();
  }
  init();
</script>
</body>
</html>
